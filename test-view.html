<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Route Rehearsal — Side-by-Side Test View</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #121212;
            font-family: 'Inter', sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        iframe {
            border: none;
            height: 100%;
        }
        .main-app {
            flex: 2;
            border-right: 2px solid #333;
        }
        .controller {
            flex: 1;
        }
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            border-bottom: 1px solid #444;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">3D Integration Test Rig — Main App (Left) | Controller (Right)</div>
    <div class="container">
        <iframe src="http://localhost:8080/" class="main-app"></iframe>
        <iframe src="http://localhost:8080/controller.html" class="controller"></iframe>
    </div>
</body>
</html>
